# Triggers the daily seasonal-reminder check at 10:00am and 10:30am
# Phoenix time (America/Phoenix is UTC-7 year-round — no DST — so these
# UTC times never need adjusting for daylight saving).
#
# WHY THIS EXISTS instead of an in-process scheduler or Render's own Cron
# Job feature: Render's free web service spins down after 15 minutes of
# no incoming requests, and an in-process scheduler (e.g. node-cron)
# simply cannot fire while the process is asleep — it would silently miss
# the 10:00am check on any day nobody happened to be using the app.
# Render's native Cron Job service would solve that, but has no free
# tier (minimum ~$1-2/month for the two daily times). This workflow is a
# free alternative: GitHub's own infrastructure fires the HTTP request
# regardless of whether the app is awake, and that same request wakes
# Render's sleeping service as a side effect.
#
# ONE-TIME SETUP (see the setup notes in the project's chat history / PR
# description for the full walkthrough):
#   1. In Render's dashboard, set CRON_SECRET to any long random string
#      (e.g. `node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"`).
#   2. In this GitHub repo: Settings > Secrets and variables > Actions >
#      New repository secret. Add:
#        RENDER_APP_URL - your live Render URL, e.g.
#                         https://lula-rose-etsy-tool.onrender.com
#                         (no trailing slash)
#        CRON_SECRET     - the exact same value you set in Render
name: Seasonal Reminder Checks

on:
  schedule:
    - cron: '0 17 * * *' # 10:00am Phoenix time (first reminder)
    - cron: '30 17 * * *' # 10:30am Phoenix time (follow-up reminder)
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

jobs:
  run-reminder-check:
    runs-on: ubuntu-latest
    steps:
      # Secrets/expressions are passed via `env:` and read as plain bash
      # variables ($VAR) rather than interpolated directly into the `run:`
      # script with ${{ }}. GitHub's ${{ }} substitution is a textual
      # replacement that happens BEFORE bash parses the script, so if a
      # secret's value ever contains a quote, paren, or other shell-special
      # character, direct interpolation can produce a broken (or unsafe)
      # command. Routing through env: + $VAR defers the substitution to
      # bash's own variable expansion, which is safe for arbitrary content.
      - name: Determine which slot this run is for
        id: slot
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$SCHEDULE" = "0 17 * * *" ]; then
            echo "slot=first" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "30 17 * * *" ]; then
            echo "slot=followup" >> "$GITHUB_OUTPUT"
          else
            echo "slot=first" >> "$GITHUB_OUTPUT"
          fi
      # No -f here on purpose: -f suppresses the response body on an HTTP
      # error, which is exactly the information needed to diagnose one.
      # Instead, the status code and body are captured separately, both
      # printed to the log unconditionally, and the step is failed
      # manually (exit 1) for anything outside 200-299 - so a real failure
      # still shows up as a failed run, but with the actual error visible.
      - name: Call /api/run-reminder-check
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SLOT: ${{ steps.slot.outputs.slot }}
        run: |
          response=$(curl -s -w '\n%{http_code}' -X POST "${RENDER_APP_URL}/api/run-reminder-check?slot=${SLOT}" \
            -H "x-cron-secret: ${CRON_SECRET}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP status: $http_code"
          echo "Response body: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Request failed with status $http_code"
            exit 1
          fi
